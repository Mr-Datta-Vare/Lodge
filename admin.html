<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VareX - Staff Lodge Management Portal</title>
  <meta name="description" content="VareX Administrative portal for room allocations, guest registration, check-ins, check-outs, billing and online bookings verification.">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo-container">
        <div class="logo-icon">VX</div>
        <div class="logo-text">
          <h1>VareX</h1>
          <span>Lodge System</span>
        </div>
      </div>

      <ul class="nav-links">
        <li class="nav-item">
          <a class="nav-link active" data-view="dashboard">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <rect x="3" y="3" width="7" height="9" rx="1"></rect>
              <rect x="14" y="3" width="7" height="5" rx="1"></rect>
              <rect x="14" y="12" width="7" height="9" rx="1"></rect>
              <rect x="3" y="16" width="7" height="5" rx="1"></rect>
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="rooms">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Rooms Grid</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="checkin">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="8.5" cy="7" r="4"></circle>
              <line x1="20" y1="8" x2="20" y2="14"></line>
              <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
            <span>Smart Check-In</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="guests">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="8.5" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Guest Register</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="billing">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            <span>Billing & Checkout</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-view="bookingSimulator">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            <span>Bookings Queue</span>
          </a>
        </li>
      </ul>

      <div class="sidebar-footer">
        <!-- Button link back to public site -->
        <a href="/index.html" style="display:flex; align-items:center; gap:0.5rem; color:var(--text-muted); text-decoration:none; font-size:0.8rem; margin-bottom:1rem; padding:0.5rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); transition:var(--transition-smooth);" onmouseover="this.style.color='var(--color-primary)'; this.style.borderColor='var(--color-primary)'" onmouseout="this.style.color='var(--text-muted)'; this.style.borderColor='var(--border-color)'">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Go to Public Site
        </a>
        <div class="user-badge">
          <div class="user-avatar">AD</div>
          <div class="user-info">
            <h4>Admin Desk</h4>
            <p>VareX Terminal 1</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Panel -->
    <main class="main-content">
      <header class="main-header">
        <div class="header-title">
          <h2 id="view-title">Dashboard</h2>
        </div>
        <div class="header-actions">
          <div class="live-clock">
            <span class="clock-indicator"></span>
            <span id="current-time-clock">12:00:00 PM</span>
          </div>
          <button class="quick-checkout-btn" id="quick-checkout-action">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Quick Check-Out
          </button>
        </div>
      </header>

      <!-- Viewport content injected here dynamically -->
      <section class="viewport" id="main-viewport"></section>
    </main>
  </div>

  <!-- Global Modal Overlay -->
  <div class="modal-overlay" id="global-modal">
    <div class="modal-content glass-card" id="modal-body">
      <!-- Injected by scripts -->
    </div>
  </div>

  <!-- Global Toast Notifications Container -->
  <div class="toast-container" id="toast-alerts-container"></div>

  <!-- Entry Script -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
